[build]
  command   = "npm run build"
  publish   = "dist/client"

[build.environment]
  NODE_VERSION  = "20"
  NITRO_PRESET  = "netlify"

[functions]
  directory            = "dist/server"
  node_bundler         = "none"
  included_files       = ["dist/server/**"]

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=2592000"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
